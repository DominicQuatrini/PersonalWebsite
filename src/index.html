<!DOCTYPE html>
<html>
	<head>
		<title> CSS and Javascript </title>
		<style>
			table, td {border: 1px solid}
		</style>
	</head>

	<body>
		<table>
			<tr>
				<td>Assignment</td>
				<td>Score</td>
				<td>Weight</td>
			</tr>
			<tr>
				<td>Quiz 1</td>
				<td id="q1"></td>
				<td>5%</td>
			</tr>
			<tr>
				<td>Quiz 2</td>
				<td id="q2"></td>
				<td>5%</td>
			</tr>
			<tr>
				<td>Assignment 1</td>
				<td id="a1"></td>
				<td>5%</td>
			</tr>
			<tr>
				<td>Assignment 2</td>
				<td id="a2"></td>
				<td>5%</td>
			</tr>
			<tr>
				<td>Assignment 3</td>
				<td id="a3"></td>
				<td>5%</td>
			</tr>
			<tr>
				<td>Assignment 4</td>
				<td id="a4"></td>
				<td>5%</td>
			</tr>
			<tr>
				<td>Midterm</td>
				<td id="e1"></td>
				<td>10%</td>
			</tr>
			<tr>
				<td>Final</td>
				<td id="e2"></td>
				<td>40%</td>
			</tr>
			<tr>
				<td>Project</td>
				<td id="p1"></td>
				<td>20%</td>
			</tr>
			<tr>
				<td>Total</td>
				<td id="total"></td>
				<td id="grade"></td>
			</tr>
		</table>
		<script language = "javascript" type = "text/javascript">
			let q1 = 10;
			let q2 = 5;

			let a1 = 100;
			let a2 = 75;
			let a3 = 66;
			let a4 = 95;

			let e1 = 50;
		
			let e2 = 100;

			let p1 = 20;

			let total = q1+q2+a1+a2+a3+a4+e1+e2+p1;

			document.getElementById("q1").innerHTML = q1 + "/10";
			document.getElementById("q2").innerHTML = q2 + "/10";

			document.getElementById("a1").innerHTML = a1 + "/100";
			document.getElementById("a2").innerHTML = a2 + "/100";
			document.getElementById("a3").innerHTML = a3 + "/100";
			document.getElementById("a4").innerHTML = a4 + "/100";

			document.getElementById("e1").innerHTML = e1 + "/50";
			document.getElementById("e2").innerHTML = e2 + "/100";

			document.getElementById("p1").innerHTML = p1 + "/20";

			document.getElementById("total").innerHTML = total + "/590";
			document.getElementById("grade").innerHTML = ((total/590)*100).toFixed(2) + "%";
		</script>
	</body>
</html>
